<div class="columns has-text-centered" id="praatcodes-card">
    <div class="column is-marginless is-paddingless is-one-third-desktop is-one-third-fullhd is-one-third-tablet">
        <div class="image is-16by9" style="background-image: url({{praatpost.praatpost-image}});"></div>
    </div>
    <a href="{{praatpost.url | absolute_url}}">
        <div class="column has-text-left-desktop has-text-left-tablet">
            <h1 class="title is-size-4-touch">{{praatpost.title}}</h1>
            <div class="content has-text-grey">
                {{ praatpost.description | truncate: 300 | strip_html | strip_newlines | strip | escape }}
                <hr class="has-background-grey">
                <span class="has-text-grey">Updated by <b> HAERIM HWANG </b> </span></span> 
            </div>
        </div>
    </a>
</div>
