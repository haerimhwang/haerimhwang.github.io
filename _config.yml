# Title of the Site
title: Haerim Hwang
# Description of the Site
description: Language Acquisition, Psycholinguisitcs, Natural Language Processing
# URL of Image of the Site
site-image: https://haerimhwang.github.io/assets/images/hanriver.png
# Keywords of the Site
site-keywords: Site, Template, Theme
# URL for the Image of custom Favicon
favicon-url: https://haerimhwang.github.io/assets/images/favicon.ico

# URL of the Image of Custom Hero Image (i.e., the image in the background of the very first section of the Homepage)
heroimage: https://haerimhwang.github.io/assets/images/hanriver.png

# Social Media and Contact
